version: "3.8"

services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    env_file: .env
    restart: unless-stopped
    command: ["arq", "app.queue.worker.WorkerSettings"]

volumes: {}
