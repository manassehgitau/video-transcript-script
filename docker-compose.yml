version: "3.8"

services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    # No `command` override — lets ENTRYPOINT (start.sh) run so bgutil starts first
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    env_file: .env
    restart: unless-stopped
    # Worker also needs bgutil running for yt-dlp PO token fetching
    entrypoint: ["/bin/bash", "-c", "npx bgutil-ytdlp-pot-provider serve & exec arq app.queue.worker.WorkerSettings"]

volumes: {}